blueprint:
  name: "Door Open Alert When Alarm Armed"
  description: >
    Sends a push notification when a door/window opens while your alarm is armed.
    Optional camera snapshot and cooldown to prevent spam.
    
    Free standalone automation from The Automated Home.
    For the complete 54-zone security setup with alarm response, zone monitoring,
    camera webhooks, and security lighting — check the ELK M1 Security Blueprint
    at beslain.gumroad.com/l/elk-m1-ha-security-blueprint/LAUNCH50
  domain: automation
  input:
    door_sensor:
      name: "Door/Window Sensor"
      selector:
        entity:
          domain: binary_sensor
          device_class:
            - door
            - window
            - opening
    alarm_entity:
      name: "Alarm Panel"
      selector:
        entity:
          domain: alarm_control_panel
    notify_device:
      name: "Notification Device"
      description: "Mobile device to notify"
      selector:
        device:
          integration: mobile_app
    cooldown_seconds:
      name: "Cooldown"
      description: "Minimum seconds between repeat notifications"
      default: 60
      selector:
        number:
          min: 0
          max: 600

mode: single
max_exceeded: silent

trigger:
  - platform: state
    entity_id: !input door_sensor
    to: "on"

condition:
  - condition: not
    conditions:
      - condition: state
        entity_id: !input alarm_entity
        state: "disarmed"

action:
  - variables:
      sensor_name: "{{ trigger.to_state.attributes.friendly_name | default('Sensor') }}"
      alarm_state: "{{ states(alarm_entity) | replace('_', ' ') | title }}"
  - device_id: !input notify_device
    domain: mobile_app
    type: notify
    title: "Security Alert"
    message: "{{ sensor_name }} opened while alarm is {{ alarm_state }}"
  - delay:
      seconds: !input cooldown_seconds
